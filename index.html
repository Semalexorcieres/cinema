<style>

  ];
  var titleFull = "Votre cinéma le POOM";
  var subFull = "Ouvert tous les jours cet été";

  var typed=document.getElementById('typed'), caret=document.getElementById('caret');
  var typedSub=document.getElementById('typedSub'), caretSub=document.getElementById('caretSub');
  var cam=document.getElementById('camIcon'), liveDot=document.getElementById('liveDot');
  var seances16=document.getElementById('seances16');
  var titleBlock=document.getElementById('titleBlock');
  var s2title=document.getElementById('s2title');
  var afficheLabel=document.getElementById('afficheLabel'), postersEl=document.getElementById('posters');
  var tarifs=document.getElementById('tarifs'), phrases=document.getElementById('phrases');

  POSTERS.forEach(function(p){
    var d=document.createElement('div'); d.className='poster';
    var img=document.createElement('img'); img.src=p.src; img.alt=p.title;
    d.appendChild(img); postersEl.appendChild(d);
  });
  var posters=Array.prototype.slice.call(postersEl.children);
  var timers=[], intervals=[];
  function clearAll(){ timers.forEach(clearTimeout); timers=[]; intervals.forEach(clearInterval); intervals=[]; }
  function blink(el){ var on=true; var iv=setInterval(function(){on=!on;el.style.opacity=on?1:0;},500); intervals.push(iv); return iv; }
  function T(fn,ms){ timers.push(setTimeout(fn,ms)); }

  function reset(){
    clearAll();
    typed.textContent=''; typedSub.textContent='';
    caret.style.opacity=1; caretSub.style.opacity=0;
    cam.style.opacity=0; cam.style.transform='scale(.7)';
    liveDot.style.opacity=0; liveDot.style.animation='none';
    seances16.style.opacity=0; seances16.style.transform='translateY(1vw)';
    titleBlock.style.opacity=1; titleBlock.style.display='flex';
    s2title.style.opacity=0;
    afficheLabel.style.opacity=0; afficheLabel.style.transform='translateY(1.5vw)';
    tarifs.style.opacity=0; tarifs.style.transform='translateY(1.5vw)';
    phrases.style.opacity=0; phrases.style.transform='translateY(1.5vw)';
    posters.forEach(function(p){p.style.opacity=0;p.style.transform='scale(.9) translateY(1vw)';});
  }

  function play(){
    reset();

    T(function(){cam.style.opacity=1;cam.style.transform='scale(1)';},300);
    var t0=800; var bt=blink(caret);
    for(var i=0;i<titleFull.length;i++){(function(idx){
      T(function(){typed.textContent=titleFull.slice(0,idx+1);}, t0+idx*70);
    })(i);}
    var titleEnd=t0+titleFull.length*70+250;
    T(function(){clearInterval(bt);caret.style.opacity=0;},titleEnd);

    var subStart=titleEnd+250;
    T(function(){caretSub.style.opacity=1; blink(caretSub);},subStart);
    for(var j=0;j<subFull.length;j++){(function(idx){
      T(function(){typedSub.textContent=subFull.slice(0,idx+1);}, subStart+idx*45);
    })(j);}
    var subEnd=subStart+subFull.length*45+250;
    T(function(){
      caretSub.style.opacity=0;
      liveDot.style.opacity=1; liveDot.style.animation='pulseDot 1.2s ease-in-out infinite';
    },subEnd);
    T(function(){ seances16.style.opacity=1; seances16.style.transform='translateY(0)'; },subEnd+400);

    var toScene2=subEnd+2200;
    T(function(){ titleBlock.style.opacity=0; },toScene2);
    T(function(){ titleBlock.style.display='none'; s2title.style.opacity=1; },toScene2+500);
    T(function(){ afficheLabel.style.opacity=1; afficheLabel.style.transform='translateY(0)'; },toScene2+700);
    posters.forEach(function(p,i){
      T(function(){p.style.opacity=1;p.style.transform='scale(1) translateY(0)';},toScene2+900+i*230);
    });
    var afterPosters=toScene2+900+6*230+300;
    T(function(){tarifs.style.opacity=1;tarifs.style.transform='translateY(0)';},afterPosters);
    T(function(){phrases.style.opacity=1;phrases.style.transform='translateY(0)';},afterPosters+450);

    T(play, 20000);
  }

  var style=document.createElement('style');
  style.textContent='@keyframes pulseDot{0%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.5}100%{transform:scale(1);opacity:1}}';
  document.head.appendChild(style);

  play();
  window.addEventListener('click',play);
</script>
